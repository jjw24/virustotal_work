name: VirusTotal Scan

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.filter.outputs.plugins }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            plugins:
              - 'plugins/**'

  scan:
    needs: changes
    if: needs.changes.outputs.plugins == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      # Avoid repeat downloads which bump the plugins' download count
      - uses: actions/cache/restore@v5
        with:
          path: |
            scan-files/
            .cache-meta.json
          key: plugin-zips-${{ github.ref }}

      - name: Download PR submitted plugin
        if: github.event_name == 'pull_request'
        run: python ci/src/download-plugins.py --mode new --output-dir scan-files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download plugins
        if: github.event_name != 'pull_request'
        run: python ci/src/download-plugins.py --output-dir scan-files --cache-meta .cache-meta.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/cache/restore@v5
        with:
          path: vt_cache.json
          key: vt-cache-${{ github.sha }}
          restore-keys: vt-cache-

      - uses: jjw24/virustotal-scanner-action@v1.0.1
        with:
          api-key: ${{ secrets.VT_API_KEY }}
          scan-paths: |
            ./scan-files/
          no-cache: false
          cache-path: vt_cache.json
          whitelist-path: vt_whitelist.json
          report-path: vt_report.json
          request-interval-sec: 15
          analysis-poll-timeout-sec: 600
          download-timeout-sec: 120
          max-report-age-days: 30

      - uses: actions/cache/save@v5
        if: always()
        with:
          path: vt_cache.json
          key: vt-cache-${{ github.sha }}

      - uses: actions/cache/save@v5
        if: always()
        with:
          path: |
            scan-files/
            .cache-meta.json
          key: plugin-zips-${{ github.ref }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          path: vt_report.json
          archive: false

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          path: vt_cache.json
          archive: false

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          path: .cache-meta.json
          archive: false